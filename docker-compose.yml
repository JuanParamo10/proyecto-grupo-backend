version: '3.8'

services:
  db:
    image: postgres:15
    container_name: avicola_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: avicolabase_db
      TZ: America/Bogota # Ajuste de zona horaria
    ports:
      - "5432:5432"
    volumes:
      - postgres_avicola_data:/var/lib/postgresql/data

volumes:
  postgres_avicola_data: